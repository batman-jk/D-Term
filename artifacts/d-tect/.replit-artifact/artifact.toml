kind = "web"
previewPath = "/"
title = "D-Tect"
version = "1.0.0"
id = "artifacts/d-tect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23147

[services.development]
run = "pnpm --filter @workspace/d-tect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/d-tect", "run", "build" ]
publicDir = "artifacts/d-tect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23147"
BASE_PATH = "/"
